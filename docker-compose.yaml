services:
  n8n:
    image: 'docker.n8n.io/n8nio/n8n:latest'
    environment:
      - SERVICE_URL_N8N
      - 'N8N_EDITOR_BASE_URL=${SERVICE_URL_N8N}'
      - 'WEBHOOK_URL=${SERVICE_URL_N8N}'
      - 'N8N_HOST=${SERVICE_URL_N8N}'
      - 'GENERIC_TIMEZONE=${GENERIC_TIMEZONE:-America/Sao_Paulo}'
      - 'TZ=${TZ:-America/Sao_Paulo}'
      - DB_TYPE=postgresdb
      - 'DB_POSTGRESDB_DATABASE=${POSTGRES_DB:-n8n}'
      - DB_POSTGRESDB_HOST=postgresql
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_USER=HfkB3tDeu6sEQhGm
      - DB_POSTGRESDB_SCHEMA=public
      - DB_POSTGRESDB_PASSWORD=SCRAM-SHA-256$4096:684e9c3cae4a5c7c0b25da962f741bc028f459ea218345c7fa6686bfd145363f
    volumes:
      - 'n8n-data:/home/node/.n8n'
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -qO- http://127.0.0.1:5678/'
      interval: 5s
      timeout: 20s
      retries: 10

  postgresql:
    image: 'postgres:16-alpine'
    volumes:
      - 'postgresql-data:/var/lib/postgresql/data'
    environment:
      - POSTGRES_USER=HfkB3tDeu6sEQhGm
      - POSTGRES_PASSWORD="SCRAM-SHA-256$4096:684e9c3cae4a5c7c0b25da962f741bc028f459ea218345c7fa6686bfd145363f"
      - 'POSTGRES_DB=${POSTGRES_DB:-n8n}'
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}'
      interval: 5s
      timeout: 20s
      retries: 10
  pgvector:
    image: 'pgvector/pgvector:pg17'
    container_name: pgvector-db
    environment:
      - PGPORT=5233
      - POSTGRES_USER=HfkB3tDeu6sEQhGm
      - POSTGRES_PASSWORD=SCRAM-SHA-256$4096:684e9c3cae4a5c7c0b25da962f741bc028f459ea218345c7fa6686bfd145363f
      - PGDATA=/data/postgres
    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U HfkB3tDeu6sEQhGm -d $${POSTGRES_DB}'
      interval: 5s
      timeout: 20s
      retries: 10
    ports:
      - '5233:5233'
    volumes:
      - 'pgdata:/data/postgres'
      - './postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql'
    
volumes:
  pgdata: null
  

